<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carrera Matemática</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;min-height:100vh;padding:1rem;color:#1a1a1a}

/* ── ENCABEZADO ── */
.header-wrap{display:flex;align-items:center;justify-content:center;gap:14px;max-width:900px;margin:0 auto 1.2rem;background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:12px 20px}
.header-logo{flex-shrink:0}
.header-text{text-align:center}
h1.game-title{font-size:22px;font-weight:800;color:#1a3a6b;letter-spacing:-0.5px;line-height:1.2;text-align:center}
.inst-name{font-size:11px;font-weight:600;color:#2563eb;margin-top:3px;line-height:1.35;text-align:center}
.lab-name{font-size:12px;font-weight:700;color:#059669;margin-top:3px;letter-spacing:0.2px;text-align:center}

/* ── SETUP ── */
#setup{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:1.4rem;max-width:900px;margin:0 auto}
.setup-options{display:flex;gap:1.2rem;margin-bottom:1rem}
.setup-col{flex:1}
.setup-row{margin-bottom:1rem}
.setup-row label{font-size:13px;color:#555;display:block;margin-bottom:5px;font-weight:600}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}
.tog-btn{padding:6px 13px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#555;cursor:pointer;transition:all .15s}
.tog-btn:hover{border-color:#93c5fd;color:#1d4ed8}
.tog-btn.active{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8;font-weight:600}

/* ── TARJETAS JUGADORES (siempre horizontal) ── */
.names-grid{display:flex;gap:10px}
.pcard{background:#f8fafc;border-radius:10px;padding:10px;border-top:3px solid #ccc;text-align:center;flex:1}
.pcard input{width:100%;padding:5px 8px;font-size:13px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#1a1a1a;text-align:center;outline:none;margin-top:6px}
.pcard input:focus{border-color:#3b82f6}
.emoji-picker{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:4px}
.emoji-opt{font-size:20px;width:32px;height:32px;border:2px solid transparent;border-radius:8px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.emoji-opt:hover{background:#e0f2fe;border-color:#7dd3fc}
.emoji-opt.selected{background:#dbeafe;border-color:#3b82f6;transform:scale(1.15)}
.start-btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .15s}
.start-btn:hover{background:#1d4ed8}

/* ── PISTA ── */
#race-screen{display:none;max-width:900px;margin:0 auto}
.track-wrap{background:#1e4d0f;border-radius:12px;padding:10px 12px 8px;margin-bottom:1rem}
.track-inner{background:#c8a96e;border-radius:7px;padding:4px 0;position:relative}
.t-startline{position:absolute;left:62px;top:0;bottom:0;width:2px;background:rgba(255,255,255,.7);z-index:2}
.t-finishline{position:absolute;right:12px;top:0;bottom:0;width:5px;z-index:2;background:repeating-linear-gradient(to bottom,#fff 0,#fff 6px,#222 6px,#222 12px)}
.t-flag{position:absolute;right:17px;top:-8px;font-size:14px;z-index:3}
.lane{display:flex;align-items:center;height:50px;position:relative;border-top:1px dashed rgba(255,255,255,.2)}
.lane:first-child{border-top:none}
.lane-lbl{position:absolute;left:0;width:60px;text-align:center;font-size:10px;font-weight:700;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.8);z-index:3;line-height:1.3;padding:0 2px}
.prog-bg{position:absolute;left:64px;right:16px;height:5px;background:rgba(0,0,0,.18);border-radius:3px;bottom:7px}
.prog-bar{height:100%;border-radius:3px;transition:width .55s ease}
.runner-svg{position:absolute;left:64px;width:34px;height:34px;transition:left .55s cubic-bezier(.34,1.2,.64,1);z-index:5;top:7px;font-size:26px;display:flex;align-items:center;justify-content:center;line-height:1}
.runner-svg.bounce{animation:boing .35s ease}
.runner-svg.goback{animation:goback .4s ease}
@keyframes boing{0%{transform:scale(1)}40%{transform:scale(1.4) translateY(-6px)}100%{transform:scale(1)}}
@keyframes goback{0%{transform:scale(1)}35%{transform:scale(.75) translateY(5px) rotate(-10deg)}100%{transform:scale(1)}}

/* ── PREGUNTAS siempre horizontal ── */
.q-grid{display:flex;gap:10px;margin-bottom:1rem}
.q-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1rem;transition:border-color .2s,background .2s;flex:1}
.q-card.solved{border-color:#22c55e;background:#f0fdf4}
.q-card.wrong-flash{border-color:#ef4444;background:#fef2f2}
.q-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.q-avatar{font-size:17px}
.q-pname{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-wait{background:#f1f5f9;color:#64748b}
.badge-ok{background:#dcfce7;color:#166534}
.badge-err{background:#fee2e2;color:#991b1b}
.q-score{font-size:11px;color:#888;font-weight:600;margin-bottom:7px}
.q-text{font-size:15px;font-weight:600;color:#1a1a1a;min-height:36px;margin-bottom:9px;line-height:1.4}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.opt-btn{padding:7px 9px;font-size:13px;border:1px solid #d1d5db;border-radius:8px;background:#f8fafc;color:#1a1a1a;cursor:pointer;text-align:left;transition:all .15s;font-weight:500;line-height:1.3}
.opt-btn:hover:not(:disabled){border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
.opt-btn:disabled{cursor:not-allowed}
.opt-btn.correct{background:#dcfce7!important;border-color:#22c55e!important;color:#166534!important;font-weight:700}
.opt-btn.wrong{background:#fee2e2!important;border-color:#ef4444!important;color:#991b1b!important}
.q-feedback{font-size:11px;min-height:16px;font-weight:600;line-height:1.4}
.fb-ok{color:#16a34a}
.fb-err{color:#dc2626}

/* ── BOTÓN REINICIAR ── */
.reset-top-btn{position:fixed;top:14px;left:14px;z-index:999;padding:7px 13px;background:#fff;border:1.5px solid #d1d5db;border-radius:9px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;display:none;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.10);transition:all .15s}
.reset-top-btn:hover{border-color:#ef4444;color:#ef4444;background:#fff5f5}

/* ── GANADOR ── */
#winner-screen{display:none;text-align:center;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:2.4rem;max-width:420px;margin:0 auto}
.w-av{font-size:56px;animation:cel .7s ease-in-out infinite alternate}
@keyframes cel{0%{transform:scale(1) rotate(-7deg)}100%{transform:scale(1.18) rotate(7deg)}}
.w-title{font-size:22px;font-weight:700;color:#1a1a1a;margin:10px 0 4px}
.w-sub{font-size:14px;color:#666;margin-bottom:1.4rem}
.again-btn{padding:10px 28px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.again-btn:hover{background:#1d4ed8}
</style>
</head>

<script>
const AVATARS=['🚀','🦁','🐯','🦊','🐸','🤖','👾','🦄','🐙','🦅'];
const COLORS=['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4'];
const TRACK_LEN=10;
const LABELS=['A','B','C','D'];
const DIFFICULTIES={
  facil:{label:'Fácil',ops:['+','-'],max:20},
  medio:{label:'Medio',ops:['+','-','×'],max:50},
  dificil:{label:'Difícil',ops:['+','-','×','÷'],max:100}
};
const TOPICS_DEF={
  aritmetica:'Aritmética',
  fracciones:'Fracciones',
  geometria:'Geometría',
  estadistica:'Estadística'
};
let numPlayers=2,difficulty='facil',topic='aritmetica';
let players=[],gameActive=false;

function buildSetup(){
  const npB=document.getElementById('np-btns');
  // Solo 2 o 3 jugadores
  [2,3].forEach(n=>{
    const b=document.createElement('button');
    b.className='tog-btn'+(n===2?' active':'');
    b.textContent=n+' jugadores';
    b.onclick=()=>{numPlayers=n;npB.querySelectorAll('.tog-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');buildNamesGrid();};
    npB.appendChild(b);
  });
  const dfB=document.getElementById('diff-btns');
  Object.entries(DIFFICULTIES).forEach(([k,v],i)=>{
    const b=document.createElement('button');
    b.className='tog-btn'+(i===0?' active':'');
    b.textContent=v.label;
    b.onclick=()=>{difficulty=k;dfB.querySelectorAll('.tog-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
    dfB.appendChild(b);
  });
  const tpB=document.getElementById('topic-btns');
  Object.entries(TOPICS_DEF).forEach(([k,v],i)=>{
    const b=document.createElement('button');
    b.className='tog-btn'+(i===0?' active':'');
    b.textContent=v;
    b.onclick=()=>{topic=k;tpB.querySelectorAll('.tog-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};
    tpB.appendChild(b);
  });
  buildNamesGrid();
}

function buildNamesGrid(){
  const g=document.getElementById('names-grid');
  const old=[...g.querySelectorAll('input')].map(i=>i.value);
  g.innerHTML='';
  for(let i=0;i<numPlayers;i++){
    const av=AVATARS[i];const col=COLORS[i];
    const div=document.createElement('div');
    div.className='pcard';div.style.borderTopColor=col;
    div.innerHTML=`<div class="emoji-picker" id="epick-${i}"></div><input type="text" id="pname-${i}" placeholder="Jugador ${i+1}" value="${old[i]||''}"/>`;
    g.appendChild(div);
    const ep=document.getElementById(`epick-${i}`);
    AVATARS.slice(0,10).forEach(e=>{
      const btn=document.createElement('button');
      btn.className='emoji-opt'+(e===av?' selected':'');
      btn.textContent=e;
      btn.onclick=()=>{ep.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');};
      ep.appendChild(btn);
    });
  }
}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function gcd(a,b){return b?gcd(b,a%b):a;}

function genArith(diff){
  const d=DIFFICULTIES[diff];
  const op=d.ops[Math.floor(Math.random()*d.ops.length)];
  let a,b,ans;
  if(op==='÷'){b=rand(2,12);ans=rand(1,12);a=b*ans;}
  else if(op==='×'){a=rand(2,Math.min(20,d.max));b=rand(2,Math.min(20,d.max));ans=a*b;}
  else if(op==='-'){a=rand(10,d.max);b=rand(1,a);ans=a-b;}
  else{a=rand(1,d.max);b=rand(1,d.max);ans=a+b;}
  return{text:`${a} ${op} ${b} = ?`,ans:String(ans)};
}

function genFrac(){
  const d1=rand(2,9),n1=rand(1,d1-1),d2=rand(2,9),n2=rand(1,d2-1);
  const types=['sum','sub','mul','simp'];
  const t=types[Math.floor(Math.random()*4)];
  let text,ans;
  if(t==='sum'){const num=n1*d2+n2*d1,den=d1*d2,g=gcd(num,den);text=`${n1}/${d1} + ${n2}/${d2} = ?`;ans=`${num/g}/${den/g}`;}
  else if(t==='sub'){const num=n1*d2-n2*d1,den=d1*d2;if(num<=0){const nn=n1*d2+n2*d1,g=gcd(nn,den);text=`${n1}/${d1} + ${n2}/${d2} = ?`;ans=`${nn/g}/${den/g}`;}else{const g=gcd(num,den);text=`${n1}/${d1} − ${n2}/${d2} = ?`;ans=`${num/g}/${den/g}`;}}
  else if(t==='mul'){const num=n1*n2,den=d1*d2,g=gcd(num,den);text=`${n1}/${d1} × ${n2}/${d2} = ?`;ans=`${num/g}/${den/g}`;}
  else{const g=gcd(n1,d1);text=`Simplifica: ${n1}/${d1}`;ans=`${n1/g}/${d1/g}`;}
  return{text,ans};
}

function genGeo(){
  const shapes=['rectángulo','triángulo','círculo','trapecio'];
  const s=shapes[Math.floor(Math.random()*4)];
  let text,ans;
  if(s==='rectángulo'){const a=rand(2,20),b=rand(2,20);text=`Área rectángulo ${a}×${b} = ?`;ans=String(a*b);}
  else if(s==='triángulo'){const b=rand(2,20),h=rand(2,20);text=`Área triángulo b=${b} h=${h} = ?`;ans=String((b*h)/2);}
  else if(s==='círculo'){const r=rand(1,10);text=`Área círculo r=${r} ≈ ? (π≈3.14)`;ans=String(Math.round(3.14*r*r));}
  else{const a=rand(3,15),b=rand(3,15),h=rand(2,12);text=`Área trapecio a=${a} b=${b} h=${h} = ?`;ans=String(((a+b)*h)/2);}
  return{text,ans};
}

function genEstat(){
  const n=rand(4,7);
  const data=Array.from({length:n},()=>rand(1,20));
  const types=['media','mediana','moda','rango'];
  const t=types[Math.floor(Math.random()*4)];
  let ans;
  if(t==='media'){ans=String(Math.round(data.reduce((a,b)=>a+b,0)/n*10)/10);}
  else if(t==='mediana'){const s=[...data].sort((a,b)=>a-b);ans=n%2===0?String((s[n/2-1]+s[n/2])/2):String(s[Math.floor(n/2)]);}
  else if(t==='moda'){const freq={};data.forEach(x=>freq[x]=(freq[x]||0)+1);ans=String(Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0]);}
  else{ans=String(Math.max(...data)-Math.min(...data));}
  return{text:`Datos: [${data.join(', ')}]\n${t.charAt(0).toUpperCase()+t.slice(1)} = ?`,ans};
}

function generateQuestion(){
  const q=topic==='fracciones'?genFrac():topic==='geometria'?genGeo():topic==='estadistica'?genEstat():genArith(difficulty);
  const wrongs=new Set();
  while(wrongs.size<3){
    let w;
    if(topic==='fracciones'){
      const parts=(q.ans+'').split('/');
      if(parts.length>1){w=`${rand(1,9)}/${rand(2,9)}`;}
      else{w=String(parseInt(q.ans)+[-3,-2,-1,1,2,3,4,5][Math.floor(Math.random()*8)]);}
    } else {
      const base=parseFloat(q.ans);
      w=String(base+[-5,-4,-3,-2,-1,1,2,3,4,5][Math.floor(Math.random()*10)]);
    }
    if(w!==q.ans)wrongs.add(w);
  }
  const opts=[q.ans,...wrongs].sort(()=>Math.random()-.5);
  return{text:q.text,ans:LABELS[opts.indexOf(q.ans)],opts};
}

function startGame(){
  players=[];
  for(let i=0;i<numPlayers;i++){
    const av=[...document.getElementById(`epick-${i}`).querySelectorAll('.emoji-opt')].find(b=>b.classList.contains('selected'))?.textContent||AVATARS[i];
    const name=document.getElementById(`pname-${i}`).value.trim()||`Jugador ${i+1}`;
    players.push({name,avatar:av,color:COLORS[i],pos:0,correct:0,wrong:0,answered:false,currentQ:null});
  }
  document.getElementById('setup').style.display='none';
  document.getElementById('race-screen').style.display='block';
  document.getElementById('reset-top-btn').style.display='flex';
  buildTrack();buildQCards();gameActive=true;
  players.forEach((_,i)=>showQuestion(i));
}

function buildTrack(){
  const ti=document.getElementById('track-inner');
  [...ti.querySelectorAll('.lane')].forEach(l=>l.remove());
  players.forEach((p,i)=>{
    const lane=document.createElement('div');
    lane.className='lane';
    lane.innerHTML=`<div class="lane-lbl" style="color:${p.color}">${p.avatar}<br>${p.name.split(' ')[0]}</div><div class="prog-bg"><div class="prog-bar" id="prog-${i}" style="background:${p.color};width:0%"></div></div><div class="runner-svg" id="runner-${i}">${p.avatar}</div>`;
    ti.insertBefore(lane,ti.querySelector('.t-finishline'));
  });
}

function updateRunner(i){
  const pct=players[i].pos/TRACK_LEN;
  const track=document.getElementById('track-inner');
  const tw=track.offsetWidth;
  const start=64,end=tw-50;
  const px=start+Math.max(0,Math.min(1,pct))*(end-start);
  document.getElementById(`runner-${i}`).style.left=px+'px';
  document.getElementById(`prog-${i}`).style.width=(pct*100)+'%';
}

function buildQCards(){
  const g=document.getElementById('q-grid');
  g.innerHTML='';
  players.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='q-card';card.id=`qcard-${i}`;
    card.style.borderTop=`3px solid ${p.color}`;
    card.innerHTML=`<div class="q-header"><span class="q-avatar">${p.avatar}</span><span class="q-pname">${p.name}</span><span class="q-badge badge-wait" id="badge-${i}">esperando…</span></div><div class="q-score" id="qscore-${i}">✓ 0  ✗ 0 | paso 0/${TRACK_LEN}</div><div class="q-text" id="qtext-${i}">Cargando…</div><div class="options-grid" id="opts-${i}"></div><div class="q-feedback" id="qf-${i}"></div>`;
    g.appendChild(card);
  });
}

function showQuestion(i){
  if(!gameActive)return;
  const q=generateQuestion();
  players[i].currentQ=q;players[i].answered=false;
  const card=document.getElementById(`qcard-${i}`);
  card.className='q-card';card.style.borderTop=`3px solid ${players[i].color}`;
  document.getElementById(`badge-${i}`).textContent='en curso…';
  document.getElementById(`badge-${i}`).className='q-badge badge-wait';
  document.getElementById(`qf-${i}`).textContent='';
  document.getElementById(`qtext-${i}`).textContent=q.text;
  const od=document.getElementById(`opts-${i}`);
  od.innerHTML='';
  q.opts.forEach((opt,oi)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';btn.textContent=`${LABELS[oi]}. ${opt}`;
    btn.onclick=()=>handleAnswer(i,LABELS[oi]);
    od.appendChild(btn);
  });
  updateScore(i);
}

function updateScore(i){
  document.getElementById(`qscore-${i}`).innerHTML=`✓ ${players[i].correct} &nbsp; ✗ ${players[i].wrong} &nbsp;|&nbsp; paso ${Math.max(0,players[i].pos)}/${TRACK_LEN}`;
}

function handleAnswer(i,chosen){
  if(!gameActive||players[i].answered)return;
  players[i].answered=true;
  const q=players[i].currentQ;
  const opts=document.getElementById(`opts-${i}`).querySelectorAll('.opt-btn');
  opts.forEach(b=>b.disabled=true);
  const correctIdx=LABELS.indexOf(q.ans);
  const chosenIdx=LABELS.indexOf(chosen);
  opts[correctIdx].classList.add('correct');
  const card=document.getElementById(`qcard-${i}`);
  const badge=document.getElementById(`badge-${i}`);
  const fb=document.getElementById(`qf-${i}`);
  const runner=document.getElementById(`runner-${i}`);
  if(chosen===q.ans){
    players[i].correct++;players[i].pos++;
    fb.textContent='¡Correcto! Avanzas un paso 🎉';fb.className='q-feedback fb-ok';
    card.className='q-card solved';card.style.borderTop=`3px solid ${players[i].color}`;
    badge.textContent='correcto ✓';badge.className='q-badge badge-ok';
    runner.classList.add('bounce');
    setTimeout(()=>runner.classList.remove('bounce'),380);
    updateRunner(i);updateScore(i);
    if(players[i].pos>=TRACK_LEN){showWinner(i);return;}
    setTimeout(()=>showQuestion(i),1600);
  } else {
    players[i].wrong++;players[i].pos=Math.max(0,players[i].pos-1);
    opts[chosenIdx].classList.add('wrong');
    fb.textContent=`Incorrecto — retrocedes un paso 😬  (Era: ${LABELS[correctIdx]}. ${q.opts[correctIdx]})`;
    fb.className='q-feedback fb-err';
    card.className='q-card wrong-flash';card.style.borderTop=`3px solid ${players[i].color}`;
    badge.textContent='incorrecto ✗';badge.className='q-badge badge-err';
    runner.classList.add('goback');
    setTimeout(()=>runner.classList.remove('goback'),420);
    updateRunner(i);updateScore(i);
    setTimeout(()=>showQuestion(i),2100);
  }
}

function showWinner(idx){
  gameActive=false;
  document.getElementById('race-screen').style.display='none';
  document.getElementById('reset-top-btn').style.display='none';
  const ws=document.getElementById('winner-screen');
  ws.style.display='flex';
  document.getElementById('w-av').textContent=players[idx].avatar;
  document.getElementById('w-title').textContent=`¡${players[idx].name} ganó la carrera!`;
  document.getElementById('w-sub').textContent=`Llegó a la meta con ${players[idx].correct} respuestas correctas y ${players[idx].wrong} incorrectas. ¡Felicitaciones!`;
}

function resetGame(){
  gameActive=false;
  document.getElementById('winner-screen').style.display='none';
  document.getElementById('race-screen').style.display='none';
  document.getElementById('setup').style.display='block';
}

buildSetup();
</script>
</body>
